<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kylskåpsrecept</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="main-header">
        <div class="header-inner">
            <h1 class="main-header-text">Vad finns i kylen?</h1>
            <button class="primary-button">Lägg till recept</button>
        </div>
    </header>

    <main>
        <section id="ingredients-panel">
            <header class="panel-header">
                <h3>Dina ingredienser</h3>
                <p id="selection-subheader" class="subheader">0 ingredienser valda</p>
            </header>

            <div class="search-container">
                <input type="text" id="ingredient-search" placeholder="Search ingredients...">
            </div>

            <div id="selected-section" class="panel-inner-section hidden">
                <header class="section-sub-header">
                    <h2>SELECTED</h2>
                    <button id="clear-all-button" class="clear-all">Clear all</button>
                </header>
                <div id="selected-ingredients-list" class="tag-list">
                </div>
            </div>

            <div class="panel-inner-section scrollable-list">
                <div id="available-ingredients-list">
                </div>
            </div>

        </section>

        <section id="recipes-section" class="recipes-panel">
            <div class="recipes-header">
                <h1 class="recipes-header-text">Tillgängliga recept</h1>
                <p id="recipe-subheader" class="subheader">Visar X recept baserat på dina ingredienser</p>
            </div>
            <div id="recipes-results-container"></div>
        </section>

    </main>

    <div id="recipe-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-modal" class="close-button">&times;</span>
            <h2>Lägg till eget recept</h2>

            <form id="recipe-form">
                <div class="form-group">
                    <label for="form-recipe-name">Receptets namn</label>
                    <input type="text" id="form-recipe-name" required placeholder="T.ex. Farmors köttbullar">
                </div>

                <div class="form-group">
                    <label for="form-recipe-time">Tillagningstid</label>
                    <select id="form-recipe-time" required>
                        <option value="snabbt">Snabbt</option>
                        <option value="mellan" selected>Mellan</option>
                        <option value="tidskrävande">Tidskrävande</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Ingredienser</label>
                    <div id="form-ingredients-list">
                        <input type="text" class="form-ingredient-input" required placeholder="T.ex. Ägg">
                    </div>
                    <button type="button" id="add-form-ingredient" class="secondary-button">+ Lägg till
                        ingrediens</button>
                </div>

                <div class="form-group">
                    <label>Instruktioner (steg för steg)</label>
                    <div id="form-steps-list">
                        <input type="text" class="form-step-input" required placeholder="Steg 1: T.ex. Blanda smeten">
                    </div>
                    <button type="button" id="add-form-step" class="secondary-button">+ Lägg till steg</button>
                </div>

                <button type="submit" class="primary-button save-recipe-btn">Spara recept</button>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
