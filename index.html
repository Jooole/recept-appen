<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kylskåpsrecept</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
</head>

<body>

    <header class="main-header">
        <div class="header-inner">
            <div class="logo-container">
                <div class="icon-bg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                        class="header-icon">
                        <path d="m16 2-2.3 2.3a3 3 0 0 0 0 4.2l1.8 1.8a3 3 0 0 0 4.2 0L22 8" />
                        <path d="M15 15 3.3 3.3a4.2 4.2 0 0 0 0 6l7.3 7.3c.7.7 2 .7 2.8 0L15 15Zm0 0 7 7" />
                        <path d="m2.1 21.8 6.4-6.3" />
                        <path d="m19 5-7 7" />
                    </svg>
                </div>
                <h1 class="main-header-text">Köksassistent</h1>
            </div>
            <button id="open-recipe-modal-btn" class="header-main-button">+ Recept</button>
        </div>
    </header>

    <main>
        <div class="main-search-container">
            <div class="search-input-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" class="search-input-icon">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                </svg>
                <input type="text" id="recipeSearchInput" placeholder="Sök recept...">
                <button type="button" id="searchCloseBtn" class="search-clear-inline-btn is-hidden"
                    aria-label="Rensa sökning">&times;</button>
            </div>
        </div>

        <div class="search-meta-container">
            <div id="search-badge-container"></div>
        </div>

        <section id="ingredients-panel">
            <div class="drag-handle"></div>
            <button id="close-ingredients-box" class="close-panel-button">&times;</button>
            <header class="panel-header">
                <h2>Välj ingredienser</h2>
                <p id="selection-subheader" class="subheader">0 valda</p>
            </header>

            <div class="search-container">
                <input type="text" id="ingredient-search" placeholder="Sök ingredienser...">
            </div>

            <div id="selected-section" class="panel-inner-section hidden">
                <header class="section-sub-header">
                    <h2>Valda</h2>
                    <button id="clear-all-button" class="clear-all">Rensa alla</button>
                </header>
                <div id="selected-ingredients-list" class="tag-list">
                </div>
            </div>

            <div class="panel-inner-section scrollable-list">
                <div id="available-ingredients-list">
                </div>
            </div>

            <button id="mobile-show-recipes-btn" class="mobile-show-btn" disabled>
                Visa recept
            </button>

        </section>

        <section id="recipes-section" class="recipes-panel">
            <div class="recipes-header">
                <div class="recipes-controls-group">
                    <label class="fav-toggle-container">
                        <input type="checkbox" id="fav-toggle"> <span class="fav-toggle-text">Visa favoriter</span>
                        <div class="toggle-switch"></div>
                    </label>
                </div>
            </div>

            <div id="recipes-results-container"></div>
        </section>

    </main>

    <div id="recipe-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-modal" class="close-button">&times;</span>
            <h1 class="modal-header">Lägg till eget recept</h1>

            <form id="recipe-form">
                <div class="form-group">
                    <label for="form-recipe-name">Receptets namn</label>
                    <input type="text" id="form-recipe-name" required
                        oninvalid="this.setCustomValidity('Fyll i det här fältet.')"
                        oninput="this.setCustomValidity('')" placeholder="T.ex. Farmors köttbullar">
                </div>

                <div class="form-group">
                    <label for="form-recipe-time">Tillagningstid</label>
                    <select id="form-recipe-time" required>
                        <option value="snabbt">Snabbt</option>
                        <option value="mellan" selected>Mellan</option>
                        <option value="tidskrävande">Tidskrävande</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Ingredienser</label>
                    <div id="form-ingredients-list">
                        <div class="form-dynamic-row">
                            <input type="text" class="form-ingredient-input" required placeholder="T.ex. Ägg">
                            <button type="button" class="form-row-remove-btn">&times;</button>
                        </div>
                    </div>
                    <button type="button" id="add-form-ingredient" class="secondary-button">+ Lägg till
                        ingrediens</button>
                </div>

                <div class="form-group">
                    <label>Instruktioner (steg för steg)</label>
                    <div id="form-steps-list">
                        <div class="form-dynamic-row">
                            <input type="text" class="form-step-input" required
                                placeholder="Steg 1: T.ex. Blanda smeten">
                            <button type="button" class="form-row-remove-btn">&times;</button>
                        </div>
                    </div>
                    <button type="button" id="add-form-step" class="secondary-button">+ Lägg till steg</button>
                </div>

                <button type="submit" class="primary-button save-recipe-btn">Spara recept</button>
            </form>
        </div>
    </div>

    <button id="mobile-footer-trigger" class="mobile-fab-button">
        <span class="fab-arrow">▲</span>
        <span class="fab-text">Ingredienser</span>
        <div id="mobile-fab-badge" class="fab-badge is-hidden">0</div>
    </button>

    <script type="module" src="app.js"></script>
</body>

</html>
